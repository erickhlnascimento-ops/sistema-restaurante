<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="../css/carrinho.css">
</head>
<body>

    <!-- Container principal do carrinho -->
    <div class="cart-container">

        <!-- Botão voltar -->
        <a href="cardapio.html" class="btn-voltar">← Voltar ao cardápio</a>

        <h1 class="title">Seu Carrinho</h1>

        <!-- Lista de itens -->
        <div class="cart-items">

            <!-- Item 1 -->
            <div class="cart-item">
                <div class="item-info">
                    <h2>Carpaccio de Filé Mignon</h2>
                    <p>Finas fatias de filé mignon com rúcula, parmesão e alcaparras.</p>
                </div>
                <div class="item-price">
                    R$ 58,00
                </div>
            </div>

            <!-- Item 2 -->
            <div class="cart-item">
                <div class="item-info">
                    <h2>Burrata com Tomates Confitados</h2>
                    <p>Burrata cremosa com tomates cereja confitados e pesto.</p>
                </div>
                <div class="item-price">
                    R$ 52,00
                </div>
            </div>

        </div>

        <!-- Total -->
        <div class="cart-total">
            <h3>Total</h3>
            <span>R$ 110,00</span>
        </div>

        <!-- Botão -->
        <button class="btn">Finalizar Pedido</button>

    </div>

</body>
</html>
