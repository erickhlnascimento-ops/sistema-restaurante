<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="../css/esquecer.css">

</head>

<body>
    <main>
        <!-- Container principal da tela de recuperação de senha -->
        <div class="login">
            <h1>Recuperar senha</h1>
            <!-- Título principal da página -->
            <form>
                <!-- Formulário para envio do e-mail de recuperação -->

                <input type="email" placeholder="Digite seu email" required>
                <!-- Campo de entrada para o e-mail (obrigatório e validado como email) -->

                <button type="submit">Enviar</button>
                <!-- Botão que envia o formulário -->
            </form>
            <p class="link-login">
                <!-- Texto com link de retorno para login -->
                Lembrou a senha? <a href="./cadastro.html">Voltar ao login</a>
            </p>
        </div>
    </main>

</body>

</html>
